services:
  service-1:
    build:
      context: ./app
    environment:
      PORT: 3000
      DELAY_MS: 200
    expose:
      - "3000"

  service-2:
    build:
      context: ./app
    environment:
      PORT: 3000
      DELAY_MS: 200
    expose:
      - "3000"

  service-3:
    build:
      context: ./app
    environment:
      PORT: 3000
      DELAY_MS: 200
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    depends_on:
      - service-1
      - service-2
      - service-3
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro

  tools:
    build:
      context: ./tools
    depends_on:
      - caddy
    volumes:
      - ./:/workspace
    working_dir: /workspace
    command: ["bash", "-lc", "while true; do sleep 3600; done"]

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 340" font-family="system-ui, sans-serif" font-size="13">

  <!-- Title -->
  <text x="340" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a1a">One Beefy Machine: 10 Cores</text>
  <text x="340" y="48" text-anchor="middle" font-size="12" fill="#888">Each core can run one CPU-bound replica at full speed</text>

  <!-- Machine box -->
  <rect x="30" y="65" width="620" height="200" rx="12" fill="#e8f0fe" stroke="#4285f4" stroke-width="2"/>
  <text x="50" y="90" font-size="14" font-weight="bold" fill="#1a1a1a">Machine A</text>

  <!-- Cores: 2 rows of 5 -->
  <!-- Row 1 -->
  <rect x="55" y="105" width="100" height="60" rx="6" fill="#4285f4" stroke="#2a6dc4" stroke-width="1.5"/>
  <text x="105" y="130" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Core 1</text>
  <text x="105" y="150" text-anchor="middle" font-size="10" fill="#c8deff">replica</text>

  <rect x="170" y="105" width="100" height="60" rx="6" fill="#4285f4" stroke="#2a6dc4" stroke-width="1.5"/>
  <text x="220" y="130" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Core 2</text>
  <text x="220" y="150" text-anchor="middle" font-size="10" fill="#c8deff">replica</text>

  <rect x="285" y="105" width="100" height="60" rx="6" fill="#4285f4" stroke="#2a6dc4" stroke-width="1.5"/>
  <text x="335" y="130" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Core 3</text>
  <text x="335" y="150" text-anchor="middle" font-size="10" fill="#c8deff">replica</text>

  <rect x="400" y="105" width="100" height="60" rx="6" fill="#4285f4" stroke="#2a6dc4" stroke-width="1.5"/>
  <text x="450" y="130" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Core 4</text>
  <text x="450" y="150" text-anchor="middle" font-size="10" fill="#c8deff">replica</text>

  <rect x="515" y="105" width="100" height="60" rx="6" fill="#4285f4" stroke="#2a6dc4" stroke-width="1.5"/>
  <text x="565" y="130" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Core 5</text>
  <text x="565" y="150" text-anchor="middle" font-size="10" fill="#c8deff">replica</text>

  <!-- Row 2 -->
  <rect x="55" y="180" width="100" height="60" rx="6" fill="#4285f4" stroke="#2a6dc4" stroke-width="1.5"/>
  <text x="105" y="205" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Core 6</text>
  <text x="105" y="225" text-anchor="middle" font-size="10" fill="#c8deff">replica</text>

  <rect x="170" y="180" width="100" height="60" rx="6" fill="#4285f4" stroke="#2a6dc4" stroke-width="1.5"/>
  <text x="220" y="205" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Core 7</text>
  <text x="220" y="225" text-anchor="middle" font-size="10" fill="#c8deff">replica</text>

  <rect x="285" y="180" width="100" height="60" rx="6" fill="#4285f4" stroke="#2a6dc4" stroke-width="1.5"/>
  <text x="335" y="205" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Core 8</text>
  <text x="335" y="225" text-anchor="middle" font-size="10" fill="#c8deff">replica</text>

  <rect x="400" y="180" width="100" height="60" rx="6" fill="#4285f4" stroke="#2a6dc4" stroke-width="1.5"/>
  <text x="450" y="205" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Core 9</text>
  <text x="450" y="225" text-anchor="middle" font-size="10" fill="#c8deff">replica</text>

  <rect x="515" y="180" width="100" height="60" rx="6" fill="#4285f4" stroke="#2a6dc4" stroke-width="1.5"/>
  <text x="565" y="205" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Core 10</text>
  <text x="565" y="225" text-anchor="middle" font-size="10" fill="#c8deff">replica</text>

  <!-- Summary -->
  <text x="340" y="295" text-anchor="middle" font-size="13" fill="#1a1a1a">10 replicas x 2 req/s each = <tspan font-weight="bold">20 req/s max</tspan></text>
  <text x="340" y="315" text-anchor="middle" font-size="12" fill="#ea4335">Not enough. You need 60 req/s. You need more machines.</text>
</svg>

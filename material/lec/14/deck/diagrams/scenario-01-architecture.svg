<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 200" font-family="system-ui, sans-serif" font-size="14">
  <defs>
    <marker id="arrow1" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>

  <!-- k6 box -->
  <rect x="20" y="60" width="140" height="80" rx="8" fill="#e8f0fe" stroke="#4285f4" stroke-width="2"/>
  <text x="90" y="95" text-anchor="middle" font-weight="bold" fill="#1a1a1a">k6</text>
  <text x="90" y="115" text-anchor="middle" font-size="12" fill="#555">100 VUs</text>

  <!-- Arrow -->
  <line x1="160" y1="100" x2="310" y2="100" stroke="#555" stroke-width="2" marker-end="url(#arrow1)"/>
  <text x="235" y="90" text-anchor="middle" font-size="11" fill="#555">all traffic</text>

  <!-- Service box -->
  <rect x="320" y="60" width="170" height="80" rx="8" fill="#fce8e6" stroke="#ea4335" stroke-width="2"/>
  <text x="405" y="90" text-anchor="middle" font-weight="bold" fill="#1a1a1a">service</text>
  <text x="405" y="110" text-anchor="middle" font-size="12" fill="#555">1 replica</text>
  <text x="405" y="126" text-anchor="middle" font-size="11" fill="#888">500ms CPU block</text>

  <!-- Title -->
  <text x="260" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a1a">Scenario 1: Single Replica</text>
  <text x="260" y="180" text-anchor="middle" font-size="12" fill="#888">All 100 VUs queue behind one blocked event loop (~2 req/s max)</text>
</svg>

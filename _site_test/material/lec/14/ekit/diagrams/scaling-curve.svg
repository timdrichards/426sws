<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 400" font-family="system-ui, sans-serif" font-size="13">

  <!-- Title -->
  <text x="310" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a1a">Expected p(95) Latency vs. Replica Count</text>

  <!-- Axes -->
  <line x1="80" y1="320" x2="570" y2="320" stroke="#333" stroke-width="2"/>
  <line x1="80" y1="320" x2="80" y2="50" stroke="#333" stroke-width="2"/>

  <!-- Y axis label -->
  <text x="25" y="185" text-anchor="middle" font-size="13" fill="#555" transform="rotate(-90, 25, 185)">p(95) Latency</text>
  <text x="68" y="70" text-anchor="end" font-size="10" fill="#888">high</text>
  <text x="68" y="315" text-anchor="end" font-size="10" fill="#888">low</text>

  <!-- X axis label -->
  <text x="325" y="365" text-anchor="middle" font-size="13" fill="#555">Replicas per Service</text>

  <!-- X axis ticks -->
  <text x="110" y="340" text-anchor="middle" font-size="11" fill="#555">1</text>
  <text x="190" y="340" text-anchor="middle" font-size="11" fill="#555">5</text>
  <text x="270" y="340" text-anchor="middle" font-size="11" fill="#555">10</text>
  <text x="350" y="340" text-anchor="middle" font-size="11" fill="#555">15</text>
  <text x="430" y="340" text-anchor="middle" font-size="11" fill="#555">20</text>
  <text x="510" y="340" text-anchor="middle" font-size="11" fill="#555">25-30</text>

  <!-- Tick marks -->
  <line x1="110" y1="320" x2="110" y2="325" stroke="#333" stroke-width="1.5"/>
  <line x1="190" y1="320" x2="190" y2="325" stroke="#333" stroke-width="1.5"/>
  <line x1="270" y1="320" x2="270" y2="325" stroke="#333" stroke-width="1.5"/>
  <line x1="350" y1="320" x2="350" y2="325" stroke="#333" stroke-width="1.5"/>
  <line x1="430" y1="320" x2="430" y2="325" stroke="#333" stroke-width="1.5"/>
  <line x1="510" y1="320" x2="510" y2="325" stroke="#333" stroke-width="1.5"/>

  <!-- Curve: high -> drops -> plateau -> rises sharply -->
  <polyline
    points="110,80 190,150 270,230 350,270 430,280 510,140"
    fill="none"
    stroke="#4285f4"
    stroke-width="3"
    stroke-linejoin="round"
  />

  <!-- Data points -->
  <circle cx="110" cy="80" r="5" fill="#4285f4"/>
  <circle cx="190" cy="150" r="5" fill="#4285f4"/>
  <circle cx="270" cy="230" r="5" fill="#4285f4"/>
  <circle cx="350" cy="270" r="5" fill="#34a853"/>
  <circle cx="430" cy="280" r="5" fill="#34a853"/>
  <circle cx="510" cy="140" r="5" fill="#ea4335"/>

  <!-- Zone 1: Improving -->
  <rect x="95" y="45" width="200" height="24" rx="4" fill="#e8f0fe"/>
  <text x="195" y="62" text-anchor="middle" font-size="11" font-weight="bold" fill="#4285f4">Improving: more cores helping</text>

  <!-- Zone 2: Plateau -->
  <rect x="310" y="290" width="155" height="24" rx="4" fill="#e6f4ea"/>
  <text x="387" y="307" text-anchor="middle" font-size="11" font-weight="bold" fill="#34a853">Plateau: cores saturated</text>

  <!-- Zone 3: Degraded -->
  <rect x="460" y="105" width="140" height="24" rx="4" fill="#fce8e6"/>
  <text x="530" y="122" text-anchor="middle" font-size="11" font-weight="bold" fill="#ea4335">Degraded: contention</text>

  <!-- Annotation: sweet spot -->
  <line x1="350" y1="270" x2="350" y2="250" stroke="#34a853" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="350" y="245" text-anchor="middle" font-size="10" fill="#34a853">sweet spot</text>

  <!-- Footer -->
  <text x="310" y="393" text-anchor="middle" font-size="11" fill="#888">Past the sweet spot, replicas compete for CPU cores and performance degrades.</text>
</svg>

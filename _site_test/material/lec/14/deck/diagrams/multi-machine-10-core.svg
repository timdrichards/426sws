<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="system-ui, sans-serif" font-size="13">

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a1a">Three Beefy Machines: 10 Cores Each</text>
  <text x="450" y="48" text-anchor="middle" font-size="12" fill="#888">30 replicas across 30 cores = 60 req/s</text>

  <!-- Global LB -->
  <rect x="370" y="62" width="160" height="44" rx="8" fill="#e6f4ea" stroke="#34a853" stroke-width="2"/>
  <text x="450" y="89" text-anchor="middle" font-weight="bold" font-size="12" fill="#1a1a1a">Global Load Balancer</text>

  <!-- Arrows from LB to machines -->
  <line x1="410" y1="106" x2="150" y2="148" stroke="#555" stroke-width="1.5"/>
  <line x1="450" y1="106" x2="450" y2="148" stroke="#555" stroke-width="1.5"/>
  <line x1="490" y1="106" x2="750" y2="148" stroke="#555" stroke-width="1.5"/>

  <!-- Machine A -->
  <rect x="15" y="148" width="270" height="310" rx="10" fill="#e8f0fe" stroke="#4285f4" stroke-width="2"/>
  <text x="150" y="172" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a1a">Machine A</text>

  <!-- Machine A cores: 2 columns of 5 -->
  <rect x="30" y="185" width="115" height="36" rx="5" fill="#4285f4"/><text x="87" y="208" text-anchor="middle" font-size="10" fill="white">Core 1 - replica</text>
  <rect x="30" y="226" width="115" height="36" rx="5" fill="#4285f4"/><text x="87" y="249" text-anchor="middle" font-size="10" fill="white">Core 2 - replica</text>
  <rect x="30" y="267" width="115" height="36" rx="5" fill="#4285f4"/><text x="87" y="290" text-anchor="middle" font-size="10" fill="white">Core 3 - replica</text>
  <rect x="30" y="308" width="115" height="36" rx="5" fill="#4285f4"/><text x="87" y="331" text-anchor="middle" font-size="10" fill="white">Core 4 - replica</text>
  <rect x="30" y="349" width="115" height="36" rx="5" fill="#4285f4"/><text x="87" y="372" text-anchor="middle" font-size="10" fill="white">Core 5 - replica</text>

  <rect x="155" y="185" width="115" height="36" rx="5" fill="#4285f4"/><text x="212" y="208" text-anchor="middle" font-size="10" fill="white">Core 6 - replica</text>
  <rect x="155" y="226" width="115" height="36" rx="5" fill="#4285f4"/><text x="212" y="249" text-anchor="middle" font-size="10" fill="white">Core 7 - replica</text>
  <rect x="155" y="267" width="115" height="36" rx="5" fill="#4285f4"/><text x="212" y="290" text-anchor="middle" font-size="10" fill="white">Core 8 - replica</text>
  <rect x="155" y="308" width="115" height="36" rx="5" fill="#4285f4"/><text x="212" y="331" text-anchor="middle" font-size="10" fill="white">Core 9 - replica</text>
  <rect x="155" y="349" width="115" height="36" rx="5" fill="#4285f4"/><text x="212" y="372" text-anchor="middle" font-size="10" fill="white">Core 10 - replica</text>

  <text x="150" y="410" text-anchor="middle" font-size="11" fill="#555">10 replicas = 20 req/s</text>

  <!-- Machine B -->
  <rect x="315" y="148" width="270" height="310" rx="10" fill="#e8f0fe" stroke="#4285f4" stroke-width="2"/>
  <text x="450" y="172" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a1a">Machine B</text>

  <rect x="330" y="185" width="115" height="36" rx="5" fill="#4285f4"/><text x="387" y="208" text-anchor="middle" font-size="10" fill="white">Core 1 - replica</text>
  <rect x="330" y="226" width="115" height="36" rx="5" fill="#4285f4"/><text x="387" y="249" text-anchor="middle" font-size="10" fill="white">Core 2 - replica</text>
  <rect x="330" y="267" width="115" height="36" rx="5" fill="#4285f4"/><text x="387" y="290" text-anchor="middle" font-size="10" fill="white">Core 3 - replica</text>
  <rect x="330" y="308" width="115" height="36" rx="5" fill="#4285f4"/><text x="387" y="331" text-anchor="middle" font-size="10" fill="white">Core 4 - replica</text>
  <rect x="330" y="349" width="115" height="36" rx="5" fill="#4285f4"/><text x="387" y="372" text-anchor="middle" font-size="10" fill="white">Core 5 - replica</text>

  <rect x="455" y="185" width="115" height="36" rx="5" fill="#4285f4"/><text x="512" y="208" text-anchor="middle" font-size="10" fill="white">Core 6 - replica</text>
  <rect x="455" y="226" width="115" height="36" rx="5" fill="#4285f4"/><text x="512" y="249" text-anchor="middle" font-size="10" fill="white">Core 7 - replica</text>
  <rect x="455" y="267" width="115" height="36" rx="5" fill="#4285f4"/><text x="512" y="290" text-anchor="middle" font-size="10" fill="white">Core 8 - replica</text>
  <rect x="455" y="308" width="115" height="36" rx="5" fill="#4285f4"/><text x="512" y="331" text-anchor="middle" font-size="10" fill="white">Core 9 - replica</text>
  <rect x="455" y="349" width="115" height="36" rx="5" fill="#4285f4"/><text x="512" y="372" text-anchor="middle" font-size="10" fill="white">Core 10 - replica</text>

  <text x="450" y="410" text-anchor="middle" font-size="11" fill="#555">10 replicas = 20 req/s</text>

  <!-- Machine C -->
  <rect x="615" y="148" width="270" height="310" rx="10" fill="#e8f0fe" stroke="#4285f4" stroke-width="2"/>
  <text x="750" y="172" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a1a">Machine C</text>

  <rect x="630" y="185" width="115" height="36" rx="5" fill="#4285f4"/><text x="687" y="208" text-anchor="middle" font-size="10" fill="white">Core 1 - replica</text>
  <rect x="630" y="226" width="115" height="36" rx="5" fill="#4285f4"/><text x="687" y="249" text-anchor="middle" font-size="10" fill="white">Core 2 - replica</text>
  <rect x="630" y="267" width="115" height="36" rx="5" fill="#4285f4"/><text x="687" y="290" text-anchor="middle" font-size="10" fill="white">Core 3 - replica</text>
  <rect x="630" y="308" width="115" height="36" rx="5" fill="#4285f4"/><text x="687" y="331" text-anchor="middle" font-size="10" fill="white">Core 4 - replica</text>
  <rect x="630" y="349" width="115" height="36" rx="5" fill="#4285f4"/><text x="687" y="372" text-anchor="middle" font-size="10" fill="white">Core 5 - replica</text>

  <rect x="755" y="185" width="115" height="36" rx="5" fill="#4285f4"/><text x="812" y="208" text-anchor="middle" font-size="10" fill="white">Core 6 - replica</text>
  <rect x="755" y="226" width="115" height="36" rx="5" fill="#4285f4"/><text x="812" y="249" text-anchor="middle" font-size="10" fill="white">Core 7 - replica</text>
  <rect x="755" y="267" width="115" height="36" rx="5" fill="#4285f4"/><text x="812" y="290" text-anchor="middle" font-size="10" fill="white">Core 8 - replica</text>
  <rect x="755" y="308" width="115" height="36" rx="5" fill="#4285f4"/><text x="812" y="331" text-anchor="middle" font-size="10" fill="white">Core 9 - replica</text>
  <rect x="755" y="349" width="115" height="36" rx="5" fill="#4285f4"/><text x="812" y="372" text-anchor="middle" font-size="10" fill="white">Core 10 - replica</text>

  <text x="750" y="410" text-anchor="middle" font-size="11" fill="#555">10 replicas = 20 req/s</text>

  <!-- Total -->
  <text x="450" y="448" text-anchor="middle" font-size="14" font-weight="bold" fill="#34a853">3 machines x 20 req/s = 60 req/s</text>
  <text x="450" y="468" text-anchor="middle" font-size="12" fill="#555">30 total cores, 30 replicas, zero contention</text>
</svg>
